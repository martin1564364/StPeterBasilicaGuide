<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B6914">
  <meta name="description" content="Audioprzewodnik po Bazylice Świętego Piotra w Rzymie — 12 przystanków w języku polskim, działa offline.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bazylika Piotra">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <title>Bazylika Świętego Piotra — Audioprzewodnik</title>
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div id="splash" class="splash" role="main" aria-label="Ekran startowy">
    <div class="splash__inner">
      <div class="splash__dome" aria-hidden="true">
        <svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="100" cy="90" rx="70" ry="75" fill="none" stroke="#C9A84C" stroke-width="2" opacity="0.4"/>
          <path d="M30 140 Q100 20 170 140" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
          <line x1="100" y1="20" x2="100" y2="5" stroke="#C9A84C" stroke-width="2"/>
          <circle cx="100" cy="4" r="4" fill="#C9A84C"/>
          <line x1="100" y1="0" x2="100" y2="-6" stroke="#C9A84C" stroke-width="1.5"/>
          <line x1="97" y1="-3" x2="103" y2="-3" stroke="#C9A84C" stroke-width="1.5"/>
          <rect x="75" y="140" width="50" height="30" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.6"/>
          <line x1="60" y1="170" x2="140" y2="170" stroke="#C9A84C" stroke-width="2"/>
        </svg>
      </div>
      <h1 class="splash__title">Bazylika<br><span>Świętego Piotra</span></h1>
      <p class="splash__subtitle">Audioprzewodnik w języku polskim</p>
      <p class="splash__stops">12 przystanków · działa offline</p>
      <button id="btn-start" class="btn-primary" aria-label="Rozpocznij zwiedzanie bazyliki">
        Rozpocznij zwiedzanie
      </button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="app hidden" aria-hidden="true">

    <!-- TOP BAR -->
    <header class="topbar" role="banner">
      <button id="btn-menu" class="topbar__menu" aria-label="Otwórz listę przystanków" aria-expanded="false" aria-controls="drawer">
        <span class="hamburger" aria-hidden="true"></span>
        <span class="hamburger" aria-hidden="true"></span>
        <span class="hamburger" aria-hidden="true"></span>
      </button>
      <span class="topbar__title" id="stop-counter" aria-live="polite">1 / 12</span>
      <button id="btn-home" class="topbar__home" aria-label="Wróć do ekranu startowego">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </button>
    </header>

    <!-- SIDE DRAWER -->
    <nav id="drawer" class="drawer" role="navigation" aria-label="Lista przystanków" aria-hidden="true">
      <div class="drawer__header">
        <h2 class="drawer__title">Przystanki</h2>
        <button id="btn-close-drawer" class="drawer__close" aria-label="Zamknij listę">✕</button>
      </div>
      <ol id="stop-list" class="stop-list" role="list">
        <!-- generated by JS -->
      </ol>
    </nav>
    <div id="drawer-overlay" class="drawer-overlay hidden" aria-hidden="true"></div>

    <!-- STOP VIEW -->
    <main id="stop-view" class="stop-view" role="main">
      <figure class="stop-image" aria-label="Zdjęcie przystanku">
        <picture>
          <source id="img-webp" type="image/webp">
          <img id="stop-img" src="" alt="" loading="eager">
        </picture>
      </figure>

      <article class="stop-content">
        <div class="stop-meta">
          <span id="stop-subtitle" class="stop-subtitle"></span>
        </div>
        <h1 id="stop-title" class="stop-title"></h1>
        <div id="stop-description" class="stop-description"></div>
      </article>

      <!-- AUDIO PLAYER -->
      <section class="audio-player" aria-label="Odtwarzacz audio">
        <audio id="audio-el" preload="none" aria-label="Nagranie audio dla tego przystanku"></audio>
        <div class="player__controls">
          <button id="btn-play" class="btn-play" aria-label="Odtwórz nagranie" aria-pressed="false">
            <svg id="icon-play" class="icon-play" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icon-pause" class="icon-pause hidden" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <div class="player__progress-area">
            <div class="player__time-row">
              <span id="time-current" class="time-current" aria-label="Czas odtwarzania">0:00</span>
              <span id="time-total" class="time-total" aria-label="Całkowity czas">2:00</span>
            </div>
            <div class="player__seekbar-wrap" role="group" aria-label="Pasek postępu">
              <input id="seekbar" class="seekbar" type="range" min="0" max="100" value="0"
                     aria-label="Przewiń nagranie" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            </div>
          </div>
        </div>
        <p class="player__hint">Naciśnij ▶ aby wysłuchać opisu</p>
      </section>
    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav" role="navigation" aria-label="Nawigacja między przystankami">
      <button id="btn-prev" class="nav-btn nav-btn--prev" aria-label="Poprzedni przystanek" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
        <span>Poprzedni</span>
      </button>
      <div class="nav-center" aria-hidden="true">
        <div id="progress-dots" class="progress-dots"></div>
      </div>
      <button id="btn-next" class="nav-btn nav-btn--next" aria-label="Następny przystanek">
        <span>Następny</span>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
      </button>
    </nav>

  </div><!-- /#app -->

  <!-- OFFLINE NOTICE -->
  <div id="offline-notice" class="offline-notice hidden" role="alert" aria-live="assertive">
    Tryb offline — treści ładowane z pamięci podręcznej
  </div>

  <script src="js/app.js"></script>
</body>
</html>
